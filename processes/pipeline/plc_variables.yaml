# Pipeline PLC Variable Map
# MORBION SCADA v02
#
# REVISION HISTORY:
#   2026-04-XX  v02    Initial MORBION SCADA v02 version
#   2026-04-23  v02a   [CHANGE] Updated expected_flow and leak_threshold
#                        expected_flow: 450.0 → 600.0
#                        leak_threshold: 15.0 → 50.0
#
# Input/Output image separation:
# Inputs READ from ProcessState at scan start.
# Outputs WRITTEN to ProcessState at scan end.
# main.py applies pump commands to equipment objects.
# operator_reset maps to fault_code — operator writes 0 to clear.

inputs:
  outlet_pressure_bar:   outlet_pressure_bar
  inlet_pressure_bar:    inlet_pressure_bar
  flow_rate_m3hr:        flow_rate_m3hr
  duty_pump_running:     duty_pump_running
  duty_pump_fault:       duty_pump_fault
  standby_pump_running:  standby_pump_running
  standby_pump_fault:    standby_pump_fault
  process_running:       process_running
  fault_code:            fault_code
  operator_reset:      operator_reset

outputs:
  duty_pump_cmd:     duty_pump_running
  standby_pump_cmd:  standby_pump_running
  inlet_valve_cmd:   inlet_valve_open
  outlet_valve_sp:   outlet_valve_position_pct
  fault_code:        fault_code
  leak_flag_cmd:     leak_flag
  leak_alarm:        alarm_leak
  inlet_low_alarm:   alarm_inlet_low
  outlet_low_alarm:  alarm_outlet_low

parameters:
  outlet_pressure_nominal: 40.0
  outlet_valve_setpoint:   85.0
  # CHANGE 2026-04-23: leak_threshold 15.0 → 50.0 (higher tolerance)
  leak_threshold:          50.0
  # CHANGE 2026-04-23: expected_flow 450.0 → 600.0 (higher target)
  expected_flow:           600.0
